<svg width="100%" height="120" viewBox="0 0 800 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0000">
        <animate attributeName="stop-color" values="#ff0000;#ff7f00;#ffff00;#00ff00;#0000ff;#4b0082;#8f00ff;#ff0000" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#00ff00">
        <animate attributeName="stop-color" values="#00ff00;#0000ff;#4b0082;#8f00ff;#ff0000;#ff7f00;#ffff00;#00ff00" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#0000ff">
        <animate attributeName="stop-color" values="#0000ff;#4b0082;#8f00ff;#ff0000;#ff7f00;#ffff00;#00ff00;#0000ff" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
  </defs>

  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle"
        font-family="Arial Black, sans-serif" font-size="72"
        fill="url(#rainbow)">
    ENTENUTE
  </text>
</svg>
